name: Publish Docker image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}
  repository_dispatch:
    types: [build-docker, build]

permissions:
  contents: read
  packages: write # 必须显式声明写 Packages 权限

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push with latest & actual version tag
        uses: docker/build-push-action@v7
        with:
          context: "."
          platforms: "linux/amd64,linux/arm64"
          push: true
          tags: |
            "docker.io/eallion/ghost:latest"
            "docker.io/eallion/ghost:6-alpine"
            "ghcr.io/${{ github.repository_owner }}/ghost:latest"
            "ghcr.io/${{ github.repository_owner }}/ghost:6-alpine"
